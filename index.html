  <style>
    .questionBox {
      width: calc(97% / 2);
      margin: 0.5%;
      float: left;
      box-sizing: border-box;
      min-height: 30vh;
    }

    #questionsIWB {
      background: #fff;
    }

    #totalQuestionsSelect,
    #fontSize {
      width: 2.5em;
      text-align: center;
    }

    .level,
    #columnSelect {
      width: 2em;
      text-align: center;
    }

    .controls h2,
    .controls h3 {
      margin: 0.5em;
      padding: 0;
    }

    #answerButton,
    #menuButton,
    #printButton {
      display: none;
    }

    div.adBox {
      margin: 1em;
      padding: 1em;
      background: #fff;
      text-align: center;
    }

    #topicMenu {
      overflow: auto;
    }

    .question-list {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      column-gap: 2em;
      list-style: none;
      padding: 0.5em 1em;
      margin: 1em auto;
      background: #fff;
      max-width: 100%;
      height: 25cm;
      /* Fixed height to force column wrapping */
      overflow-x: auto;
    }

    .question-item {
      width: 14em;
      padding: 0.4em 0.3em;
      cursor: pointer;
      break-inside: avoid;
    }

    .question-item:hover {
      background-color: #f0f0f0;
    }

    .question-item .q-number {
      font-weight: bold;
      margin-right: 0.4em;
    }

    .question-item .q-content {
      display: inline;
    }

    /* Print button styling */
    #printButton {
      background: #4CAF50;
      color: #fff;
      border: 1px solid #388E3C;
      padding: 0.3em 1em;
      cursor: pointer;
      font-size: inherit;
    }

    #printButton:hover {
      background: #388E3C;
    }

    .custom-heading {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2em;
    }

    .custom-frac {
      display: inline-block !important;
      vertical-align: middle !important;
      text-align: center !important;
      margin: 0 0.2em !important;
      font-size: 0.9em !important;
    }

    .custom-frac-num {
      display: block !important;
      padding: 0.1em !important;
      line-height: 1 !important;
    }

    .custom-frac-den {
      display: block !important;
      padding: 0.1em !important;
      line-height: 1 !important;
      border-top: 1px solid black !important;
    }

    /* Print media query: hide everything except questions */
    @media print {
      body {
        padding: 0;
      }

      .question-list {
        height: 25cm;
        /* Match screen height so it doesn't balance */
        overflow: visible;
      }

      body {
        padding: 1cm;
      }

      .controls,
      .iconMenu,
      #footer,
      #menuButton,
      #answerButton,
      #printButton {
        display: none !important;
      }

      #questionsIWB {
        display: block !important;
      }

    }
  </style>

      s = s.replace(/\\gt/g, '>');

      // Handle fractions: \frac{a}{b} -> vertical HTML fraction
      s = s.replace(/\\frac\{([^}]*)\}\{([^}]*)\}/g, '<span class="custom-frac"><span class="custom-frac-num">$1</span><span class="custom-frac-den">$2</span></span>');
      // Handle superscripts: ^{n} -> <sup>n</sup>, ^n -> <sup>n</sup>
      s = s.replace(/\^\{([^}]*)\}/g, '<sup>$1</sup>');
      s = s.replace(/\^([a-zA-Z0-9])/g, '<sup>$1</sup>');
      // Handle subscripts: _{n} -> <sub>n</sub>, _n -> <sub>n</sub>
      s = s.replace(/_\{([^}]*)\}/g, '<sub>$1</sub>');
      s = s.replace(/_([a-zA-Z0-9])/g, '<sub>$1</sub>');
      // Remove \text{} wrapper
      s = s.replace(/\\text\{([^}]*)\}/g, '$1');
      // Handle roots with index: \sqrt[n]{x} -> x<sup>1/n</sup>
      s = s.replace(/\\?sqrt\s*\[(.*?)\]\s*\{(.*?)\}/g, '$2<sup>1/$1</sup>');
      // Fallback if curly braces are somehow missing
      s = s.replace(/\\?sqrt\s*\[(.*?)\]\s*([0-9.]+)/g, '$2<sup>1/$1</sup>');
      // Remove \sqrt{} -> √(x)
      s = s.replace(/\\sqrt\{([^}]*)\}/g, '√($1)');
      // Remove remaining curly braces
      s = s.replace(/[{}]/g, '');
      // Remove any remaining backslashes before letters
      s = s.replace(/\\([a-zA-Z]+)/g, '$1');
      // Remove backslash-space (LaTeX space command)
      s = s.replace(/\\ /g, ' ');
      // Remove any remaining lone backslashes
      s = s.replace(/\\/g, '');
      // Clean up extra spaces
      s = s.replace(/\s+/g, ' ').trim();

      // Convert adjacent div tags to spaces to keep things inline
      s = s.replace(/<\/div>\s*<div[^>]*>/g, ' ');
      // Remove all remaining div tags to prevent block-level line breaks
      s = s.replace(/<\/?div[^>]*>/g, '');

      // Decode HTML entities
      var tmp = document.createElement('textarea');
      tmp.innerHTML = s;
      s = tmp.value;
      return s;
    }
    function createSheet() {
      question = [];
      columns = 1;
      totalQuestions = parseInt(totalQuestionsSelect.value);
      if (totalQuestions < 1) {
        totalQuestions = 1;
        totalQuestionsSelect.value = 1;
      }
      if (totalQuestions > 50) {
        totalQuestions = 50;
        totalQuestionsSelect.value = 50;
      }
      showingAnswers = false;
      answerButton.innerHTML = "Show Answers";
      var data = "<div class='question-list'>";
      for (var i = 0; i < totalQuestions; i++) {
        var min = parseInt(document.getElementById("level0Min").value);
        var max = parseInt(document.getElementById("level0Max").value);
        var step = (max - min) / (totalQuestions);
        var level = Math.floor(min + step * i);
        if (level < 0) {
          level = 0;
        }
        if (level > 10) {
          level = 10;
        }
        var chosenTopic = document.getElementById("topic0").value;
        if (chosenTopic == "0") {
          var randomSelect = document.getElementById("randomTopics");
          if (randomSelect && randomSelect.selectedOptions.length > 0) {
            var opts = Array.from(randomSelect.selectedOptions);
            chosenTopic = opts[Math.floor(Math.random() * opts.length)].value;
          }
        }
        getQuestion(chosenTopic, level / 10);
        var attempts = 0;
        do {
          var repeat = false;
          var newlyAdded = question.length - 1;
          for (var k = 0; k < newlyAdded; k++) {
            if (question[newlyAdded].answer === question[k].answer) {
              repeat = true;
              break;
            }
          }
          if (repeat) {
            var retryTopic = document.getElementById("topic0").value;
            if (retryTopic == "0") {
              var randomSelect = document.getElementById("randomTopics");
              if (randomSelect && randomSelect.selectedOptions.length > 0) {
                var opts = Array.from(randomSelect.selectedOptions);
                retryTopic = opts[Math.floor(Math.random() * opts.length)].value;
              }
            }
            getQuestion(retryTopic, level / 10);
            question[newlyAdded] = question[question.length - 1];
            question.pop();
            attempts++;
            if (attempts % 40 === 0) {
              level++;
            }
          }
        } while (repeat === true && attempts < 300);
        question[(question.length - 1)].showingQuestion = true;
        data += "<div class='question-item' style='font-size:" + parseInt(fontSize.value) + "px;' onclick='toggleAnswer(" + (question.length - 1) + ")' id='a" + (question.length - 1) + "'>";
        data += "<span class='q-number'>" + (i + 1) + ")</span> ";
        var cleanQ = stripLatex(question[question.length - 1].question).trim();
        if (cleanQ.endsWith("?")) cleanQ = cleanQ.slice(0, -1).trim();
        if (!cleanQ.includes("=")) cleanQ += " =";
        data += "<span class='q-content'>" + cleanQ + "</span>";
        data += "</div>";
      }
      data += "</div>";
      var headingText = document.getElementById('customHeading') ? document.getElementById('customHeading').value : "";
      if (document.getElementById('printHeadingDisplay')) {
        document.getElementById('printHeadingDisplay').innerText = headingText;
        if (headingText.trim() !== "") {
          document.getElementById('printHeadingDisplay').style.display = "block";
        } else {
          document.getElementById('printHeadingDisplay').style.display = "none";
        }
      }
      document.getElementById('questionsIWB').innerHTML = data;
      document.getElementById('questionsIWB').style.display = "block";
      document.getElementById('answerButton').style.display = "inline-block";
      document.getElementById('menuButton').style.display = "inline-block";
      document.getElementById('printButton').style.display = "inline-block";
      document.getElementById('topicMenu').style.display = "none";
      MathJax.typesetPromise();
    }
    function displayQuestions() {
      var data = "<div class='question-list'>";
      for (var i = 0; i < totalQuestions; i++) {
        data += "<div class='question-item' style='font-size:" + parseInt(fontSize.value) + "px;' onclick='toggleAnswer(" + i + ")' id='a" + i + "'>";
        data += "<span class='q-number'>" + (i + 1) + ")</span> ";
        var cleanQ = stripLatex(question[i].question).trim();
        if (cleanQ.endsWith("?")) cleanQ = cleanQ.slice(0, -1).trim();
        if (!cleanQ.includes("=")) cleanQ += " =";
        data += "<span class='q-content'>" + cleanQ + "</span>";
        data += "</div>";
      }
      data += "</div>";
      var headingText = document.getElementById('customHeading') ? document.getElementById('customHeading').value : "";
      if (document.getElementById('printHeadingDisplay')) {
        document.getElementById('printHeadingDisplay').innerText = headingText;
        if (headingText.trim() !== "") {
          document.getElementById('printHeadingDisplay').style.display = "block";
        } else {
          document.getElementById('printHeadingDisplay').style.display = "none";
        }
      }
      document.getElementById('questionsIWB').innerHTML = data;
      MathJax.typesetPromise();
    }
    function printQuestions() {
      window.print();
    }
    function showMenu() {
      document.getElementById('questionsIWB').style.display = "none";
      if (document.getElementById('printHeadingDisplay')) {
        document.getElementById('printHeadingDisplay').style.display = "none";
      }
      document.getElementById('topicMenu').style.display = "block";
      document.getElementById('answerButton').style.display = "none";
      document.getElementById('menuButton').style.display = "none";
    }

    function toggleAnswer(i) {
      if (event.shiftKey) {
        openResource(1, i);
      } else {
        var el = document.getElementById('a' + i);
        if (question[i].showingQuestion) {
          el.innerHTML = "<span class='q-number'>" + (i + 1) + ")</span> <span class='q-content'>" + stripLatex(question[i].answer) + "</span>";
          question[i].showingQuestion = false;
        } else {
          el.innerHTML = "<span class='q-number'>" + (i + 1) + ")</span> <span class='q-content'>" + stripLatex(question[i].question) + " =</span>";
          question[i].showingQuestion = true;
        }
        MathJax.typesetPromise();
      }
    }
    function filter(keyword, x) {
      var id = "topic" + x;
      for (var i = 0; i < document.getElementById(id).length; i++) {
        var txt = document.getElementById(id).options[i].text;
        var include = txt.toLowerCase().search(keyword.toLowerCase());
        if (include > -1) {
          document.getElementById(id).options[i].style.display = 'list-item';
          document.getElementById(id).options[i].disabled = false;
        } else {
          document.getElementById(id).options[i].style.display = 'none';
          document.getElementById(id).options[i].disabled = true;
        }
      }
      for (var i = 1; i < document.getElementById(id).length; i++) {
        var random = true;
        if (document.getElementById(id).options[i].disabled !== true) {
          document.getElementById(id).selectedIndex = i;
          random = false;
          i = document.getElementById(id).length;
        }
      }
      if (random) {
        document.getElementById(id).selectedIndex = 0;
      }
    }
    function toggleAnswers() {
      if (question[0]) {
        if (showingAnswers) {
          for (var i = 0; i < totalQuestions; i++) {
            var el = document.getElementById('a' + i);
            el.innerHTML = "<span class='q-number'>" + (i + 1) + ")</span> <span class='q-content'>" + stripLatex(question[i].question) + " =</span>";
            question[i].showingQuestion = true;
          }
          answerButton.innerHTML = "Show Answers";
          showingAnswers = false;
        } else {
          for (var i = 0; i < totalQuestions; i++) {
            var el = document.getElementById('a' + i);
            el.innerHTML = "<span class='q-number'>" + (i + 1) + ")</span> <span class='q-content'>" + stripLatex(question[i].answer) + "</span>";
            question[i].showingQuestion = false;
          }
          answerButton.innerHTML = "Show Questions";
          showingAnswers = true;
        }
      }
      MathJax.typesetPromise();
    }
    function refreshQuestion(col, i) {
      var min = parseInt(document.getElementById("level0Min").value);
      var max = parseInt(document.getElementById("level0Max").value);
      var step = (max - min) / (totalQuestions);
      var level = Math.floor(min + step * i / columns);
      if (level < 0) {
        level = 0;
      }
      if (level > 10) {
        level = 10;
      }
      getQuestion(document.getElementById("topic0").value, level / 10);
      question[i] = question[question.length - 1];
      question.pop();
      var attempts = 0;
      do {
        var repeat = false;
        for (var k = 0; k < totalQuestions * columns; k++) {
          if (i !== k && question[i].answer === question[k].answer) {
            repeat = true;
          }
        }
        if (repeat) {
          getQuestion(document.getElementById("topic0").value, level / 10);
          question[i] = question[question.length - 1];
          question.pop();
          attempts++;
          if (attempts % 30 === 0) {
            level++;
          }
        }
      } while (repeat === true && attempts < 100);
      toggleAnswer(i);
    }
    setUp();
  </script>
